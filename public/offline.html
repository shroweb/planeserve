<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001b2e" />
    <title>Aircraft Program — Offline</title>
    <style>
      :root {
        color-scheme: light;
        --navy: #001b2e;
        --blue: #6969c6;
        --paper: #f7f8f9;
        --muted: #5f6875;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: #101820;
        font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid #d7dde4;
        background: white;
        padding: 34px;
        box-shadow: 0 22px 70px rgb(0 27 46 / 10%);
      }

      .mark {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background: var(--navy);
        display: grid;
        place-items: center;
        margin-bottom: 26px;
      }

      .mark img {
        width: 28px;
        height: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 8vw, 48px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
        margin: 18px 0 0;
      }

      a {
        margin-top: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        background: var(--blue);
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <img src="/favicon.svg" alt="" />
      </div>
      <h1>You are offline.</h1>
      <p>
        Aircraft Program needs a connection for live AOG cases, account data and supplier updates. Reconnect
        and refresh to continue.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
